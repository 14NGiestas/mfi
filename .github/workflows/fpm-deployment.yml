name: fpm-deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_NAME: "mfi"

jobs:
  exhaustive-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cpu-only
            environment: cpu-only
            profile: ""
            test: true
          - name: gpu-modern
            environment: gpu-modern
            profile: debug
            test: true
          - name: gpu-modern-cublas
            environment: gpu-modern
            profile: cublas
            test: compile-only
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
      with:
        extra-conf: |
          extra-experimental-features = nix-command flakes

    - name: Set CI test size
      run: |
        echo "MFI_TEST_ELEMENTS=50000" >> $GITHUB_ENV
        echo "MFI_TEST_SAMPLES=1" >> $GITHUB_ENV

    - name: Generate sources
      run: nix develop --command make

    - name: Compile (all combinations)
      run: |
        if [ -n "${{ matrix.profile }}" ]; then
          nix develop .#${{ matrix.environment }} --command fpm build --profile ${{ matrix.profile }}
        else
          nix develop .#${{ matrix.environment }} --command fpm build
        fi

    - name: Run tests
      if: matrix.test != 'compile-only'
      run: |
        if [ -n "${{ matrix.profile }}" ]; then
          nix develop .#${{ matrix.environment }} --command fpm test --profile ${{ matrix.profile }}
        else
          nix develop .#${{ matrix.environment }} --command fpm test
        fi

  consumer-test:
    needs: exhaustive-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: consumer-cpu
            environment: cpu-only
            profile: ""
          - name: consumer-cublas
            environment: gpu-modern
            profile: cublas
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
      with:
        extra-conf: |
          extra-experimental-features = nix-command flakes

    - name: Generate sources
      run: nix develop --command make

    - name: Test consumer project
      run: |
        mkdir -p consumer/app
        cp ci/consumer/app/main.f90 consumer/app/main.f90

        cd consumer

        if [ "${{ matrix.profile }}" = "cublas" ]; then
          cp ../ci/consumer/fpm-cublas.toml fpm.toml
          nix develop ..#${{ matrix.environment }} --command fpm build --profile cublas
        else
          cp ../ci/consumer/fpm-cpu.toml fpm.toml
          nix develop ..#${{ matrix.environment }} --command fpm build
        fi

  deploy-artifacts:
    needs: [exhaustive-test, consumer-test]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/impl/cublas') && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
      with:
        extra-conf: |
          extra-experimental-features = nix-command flakes

    - name: Generate sources
      run: nix develop --command make

    - name: Prepare mfi-fpm
      if: github.ref == 'refs/heads/main'
      run: |
        mkdir -p ${{ env.PROJECT_NAME }}-fpm
        cp -R src test fpm.toml LICENSE ${{ env.PROJECT_NAME }}-fpm
        find ${{ env.PROJECT_NAME }}-fpm/src  -type f ! -name "*.f90" ! -name "*.c" -delete
        find ${{ env.PROJECT_NAME }}-fpm/test -type f ! -name "*.f90" -delete

    - name: Deploy to mfi-fpm
      uses: JamesIves/github-pages-deploy-action@v4
      if: github.ref == 'refs/heads/main'
      with:
        branch: mfi-fpm
        folder: ${{ env.PROJECT_NAME }}-fpm
        clean: true

    - name: Prepare mfi-cublas
      run: |
        mkdir -p ${{ env.PROJECT_NAME }}-cublas
        cp -R src test fpm.toml LICENSE ${{ env.PROJECT_NAME }}-cublas
        find ${{ env.PROJECT_NAME }}-cublas/src  -type f ! -name "*.f90" ! -name "*.c" -delete
        find ${{ env.PROJECT_NAME }}-cublas/test -type f ! -name "*.f90" -delete

    - name: Deploy to mfi-cublas
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: mfi-cublas
        folder: ${{ env.PROJECT_NAME }}-cublas
        clean: true
