name: fpm-deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: "mfi"

jobs:
  exhaustive-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cpu-only
            environment: cpu-only
            profile: release
            test: true
          - name: gpu-modern
            environment: gpu-modern
            profile: release
            test: true
          - name: gpu-modern-cublas
            environment: gpu-modern
            profile: cublas
            test: compile-only
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install fypp and fpm
      run: |
        pip install --upgrade fypp
        curl -sSfL https://github.com/fortran-lang/fpm/releases/download/v0.13.0/fpm-0.13.0-linux-x86_64-gcc-12 -o /usr/local/bin/fpm
        chmod +x /usr/local/bin/fpm

    - name: Generate sources
      run: make

    - name: Compile (all combinations)
      run: |
        nix-shell shells/${{ matrix.environment }}.nix --run "fpm build --profile ${{ matrix.profile }}"

    - name: Run tests
      if: matrix.test == 'true'
      run: |
        nix-shell shells/${{ matrix.environment }}.nix --run "fpm test --profile ${{ matrix.profile }}"

  consumer-test:
    needs: exhaustive-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: consumer-cpu
            environment: cpu-only
            profile: release
          - name: consumer-cublas
            environment: gpu-modern
            profile: cublas
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main

    - name: Install fypp and fpm
      run: |
        pip install --upgrade fypp
        curl -sSfL https://github.com/fortran-lang/fpm/releases/download/v0.13.0/fpm-0.13.0-linux-x86_64-gcc-12 -o /usr/local/bin/fpm
        chmod +x /usr/local/bin/fpm

    - name: Generate sources
      run: make

    - name: Test consumer project
      run: |
        fpm new consumer
        cd consumer

        cat > app/main.f90 << 'FORTRAN_EOF'
        program main
          use mfi_blas, only: mfi_gemm
          use iso_fortran_env
          implicit none
          real(real64) :: A(4,4), B(4,4), C(4,4)
          call random_number(A)
          call random_number(B)
          C = 0.0_real64
          call mfi_gemm(A, B, C)
          print *, "Consumer build successful, mfi_gemm ran."
        end program main
        FORTRAN_EOF

        if [ "${{ matrix.profile }}" = "cublas" ]; then
          cat > fpm.toml << 'TOML_EOF'
          name = "consumer"
          version = "0.1.0"

          [dependencies]
          mfi = { path = "..", features = ["cublas"] }

          [build]
          link = ["cublas", "cudart"]
          TOML_EOF
        else
          cat > fpm.toml << 'TOML_EOF'
          name = "consumer"
          version = "0.1.0"

          [dependencies]
          mfi = { path = ".." }
          TOML_EOF
        fi

        nix-shell ../shells/${{ matrix.environment }}.nix --run "fpm build"

  deploy-artifacts:
    needs: [exhaustive-test, consumer-test]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/impl/cublas') && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install fypp
      run: pip install --upgrade fypp

    - name: Generate sources
      run: make

    - name: Prepare mfi-fpm
      if: github.ref == 'refs/heads/main'
      run: |
        mkdir -p ${{ env.PROJECT_NAME }}-fpm
        cp -R src test fpm.toml LICENSE ${{ env.PROJECT_NAME }}-fpm
        find ${{ env.PROJECT_NAME }}-fpm/src  -type f ! -name "*.f90" ! -name "*.c" -delete
        find ${{ env.PROJECT_NAME }}-fpm/test -type f ! -name "*.f90" -delete

    - name: Deploy to mfi-fpm
      uses: JamesIves/github-pages-deploy-action@v4
      if: github.ref == 'refs/heads/main'
      with:
        branch: mfi-fpm
        folder: ${{ env.PROJECT_NAME }}-fpm
        clean: true

    - name: Prepare mfi-cublas
      run: |
        mkdir -p ${{ env.PROJECT_NAME }}-cublas
        cp -R src test fpm.toml LICENSE ${{ env.PROJECT_NAME }}-cublas
        find ${{ env.PROJECT_NAME }}-cublas/src  -type f ! -name "*.f90" ! -name "*.c" -delete
        find ${{ env.PROJECT_NAME }}-cublas/test -type f ! -name "*.f90" -delete

    - name: Deploy to mfi-cublas
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: mfi-cublas
        folder: ${{ env.PROJECT_NAME }}-cublas
        clean: true
