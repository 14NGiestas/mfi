name: fpm-deployment

on:
  push:
    branches: [main, impl/cublas]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_NAME: "mfi"

jobs:
  exhaustive-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cpu-only
            environment: cpu-only
            profile: ""
            test: true
          - name: gpu-modern
            environment: gpu-modern
            profile: debug
            test: true
          - name: gpu-modern-cublas
            environment: gpu-modern
            profile: cublas
            test: compile-only
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
      with:
        extra-conf: |
          extra-experimental-features = nix-command flakes

    - name: Enable Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@main

    - name: Set CI test size
      run: |
        echo "MFI_TEST_ELEMENTS=50000" >> $GITHUB_ENV
        echo "MFI_TEST_SAMPLES=1" >> $GITHUB_ENV

    - name: Generate sources
      run: nix develop --command make

    - name: Compile (all combinations)
      run: |
        if [ -n "${{ matrix.profile }}" ]; then
          nix develop .#${{ matrix.environment }} --command bash -c "fortran-fpm build --profile ${{ matrix.profile }}"
        else
          nix develop .#${{ matrix.environment }} --command bash -c "fortran-fpm build"
        fi

    - name: Run tests
      if: matrix.test != 'compile-only'
      run: |
        if [ -n "${{ matrix.profile }}" ]; then
          nix develop .#${{ matrix.environment }} --command bash -c "fortran-fpm test --profile ${{ matrix.profile }}"
        else
          nix develop .#${{ matrix.environment }} --command bash -c "fortran-fpm test"
        fi

  consumer-test:
    needs: exhaustive-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cpu-basic
            dir: ci/consumer/cpu_basic
            environment: cpu-only
            mode: run
          - name: gpu-lazy
            dir: ci/consumer/gpu_lazy
            environment: gpu-modern
            mode: compile
          - name: gpu-explicit
            dir: ci/consumer/gpu_explicit
            environment: gpu-modern
            mode: compile
          - name: lapack
            dir: ci/consumer/lapack
            environment: cpu-only
            mode: run
          - name: extensions
            dir: ci/consumer/extensions
            environment: gpu-modern
            mode: compile
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
      with:
        extra-conf: |
          extra-experimental-features = nix-command flakes

    - name: Enable Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@main

    - name: Generate sources
      run: nix develop --command make

    - name: Compile consumer
      working-directory: ${{ matrix.dir }}
      run: nix develop ${{ github.workspace }}#${{ matrix.environment }} --command bash -c "fortran-fpm build"

    - name: Run consumer
      if: matrix.mode == 'run'
      working-directory: ${{ matrix.dir }}
      run: nix develop ${{ github.workspace }}#${{ matrix.environment }} --command bash -c "fortran-fpm run"

  deploy-artifacts:
    needs: [exhaustive-test, consumer-test]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/impl/'))
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
      with:
        extra-conf: |
          extra-experimental-features = nix-command flakes

    - name: Enable Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@main

    - name: Compute deploy branch
      id: deploy
      run: |
        REF="${{ github.ref }}"
        if [ "$REF" = "refs/heads/main" ]; then
          echo "suffix=fpm" >> $GITHUB_OUTPUT
        else
          FEATURE="${REF#refs/heads/impl/}"
          echo "suffix=${FEATURE}" >> $GITHUB_OUTPUT
        fi

    - name: Generate sources
      run: nix develop --command make

    - name: Prepare deploy artifact
      run: |
        mkdir -p ${{ env.PROJECT_NAME }}-${{ steps.deploy.outputs.suffix }}
        cp -R src test fpm.toml LICENSE ${{ env.PROJECT_NAME }}-${{ steps.deploy.outputs.suffix }}
        find ${{ env.PROJECT_NAME }}-${{ steps.deploy.outputs.suffix }}/src  -type f ! -name "*.f90" ! -name "*.c" -delete
        find ${{ env.PROJECT_NAME }}-${{ steps.deploy.outputs.suffix }}/test -type f ! -name "*.f90" -delete

    - name: Deploy
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: mfi-${{ steps.deploy.outputs.suffix }}
        folder: ${{ env.PROJECT_NAME }}-${{ steps.deploy.outputs.suffix }}
        clean: true
