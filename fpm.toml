name    = "mfi"
version = "0.0.1"
license = "MIT"
author  = "Ian Giestas Pauli"
maintainer = "iangiestas@usp.br"

[library]
build-script="Makefile"
include-dir = ["/usr/local/cuda/include"]

[build]
link = ["blas","lapack","cublas","cudart"]

[features]
cublas.flags = "-I/usr/local/cuda/include -L/usr/local/cuda/lib64 -Wl,-rpath,/usr/local/cuda/lib64"
cublas.c-flags = "-I/usr/local/cuda/include"

[profiles]
cublas = ["cublas"]
